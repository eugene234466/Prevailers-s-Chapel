}

.verse-ref{

}

.spinner{

}

font-size:.9rem;

.error-box{

</nav><div class="page"><div class="page-header">
<div class="date-pill" id="datePill">Loading…</div>
<h1>📖 Daily Devotional</h1>
<p>Start your day with God's Word.</p>
</div><div class="verse-card" id="verseCard">
<div class="loader">
<div class="spinner"></div>
Fetching today's scripture…
</div>
</div><div class="content-card" id="contentCard" style="display:none;">
<div class="card-section">
<div class="section-label">Today's Message</div>
<div class="message-title" id="msgTitle"></div>
<div class="message-body" id="msgBody"></div>
</div><div class="card-section">
<div class="section-label">Reflection Questions</div>
<ul class="reflections" id="reflections"></ul>
</div><div class="share-row">
<button class="btn-share btn-whatsapp" id="btnWhatsapp">Share on WhatsApp</button>
<button class="btn-share btn-copy" id="btnCopy">Copy Verse</button>
</div>
</div><div class="prayer-section" id="prayerSection" style="display:none;">
<div class="prayer-text" id="prayerText"></div>
</div><div id="errorBox" class="error-box" style="display:none;"></div></div><script>

document.getElementById('datePill').textContent =
new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

let _verseText='';
let _verseRef='';

async function loadVerse(){

try{

const res=await fetch('https://beta.ourmanna.com/api/v1/get/?format=json');
const data=await res.json();

_verseText=data.verse.details.text;
_verseRef=data.verse.details.reference;

document.getElementById('verseCard').innerHTML=`
<div class="verse-label">Verse of the Day</div>
<div class="verse-text">"${_verseText}"</div>
<div class="verse-ref">— ${_verseRef}</div>
`;

setupShareButtons();
await generateDevotion(_verseText,_verseRef);

}catch(e){

_verseText='I can do all things through Christ who strengthens me.';
_verseRef='Philippians 4:13';

setupShareButtons();
await generateDevotion(_verseText,_verseRef);

}

}

async function generateDevotion(verseText,verseRef){

try{

const response=await fetch('./api/devotional',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({verseText,verseRef})
});

const parsed=await response.json();
renderContent(parsed);

}catch(e){

renderFallback(verseText,verseRef);

}

}

function renderContent(parsed){

document.getElementById('msgTitle').textContent=parsed.title;

const body=document.getElementById('msgBody');
body.innerHTML='';

parsed.message.forEach(p=>{
const el=document.createElement('p');
el.textContent=p;
body.appendChild(el);
});

const refl=document.getElementById('reflections');
refl.innerHTML='';

parsed.reflections.forEach((q,i)=>{
const li=document.createElement('li');
li.innerHTML=`<span class="refl-num">${i+1}</span>${q}`;
refl.appendChild(li);
});

document.getElementById('prayerText').textContent=parsed.prayer;

document.getElementById('contentCard').style.display='block';
document.getElementById('prayerSection').style.display='block';

}

function renderFallback(verseText,verseRef){

const fallback={
title:`Walking in the Truth of ${verseRef}`,
message:[
`The Word of God speaks to us through ${verseRef}: "${verseText}".`,
`Meditating on this verse reminds us God remains faithful.`,
`Carry this scripture today and let it guide you.`
],
reflections:[
`What situation does this verse speak to?`,
`How can you live this verse today?`,
`Who can you encourage with it?`,
`Where do you need faith?`
],
prayer:`Heavenly Father, thank You for the truth of ${verseRef}. Help me live according to Your Word today. Amen.`
};

renderContent(fallback);

}

function setupShareButtons(){

document.getElementById('btnWhatsapp').onclick=()=>{
const msg=`📖 Daily Devotional — ${_verseRef}

"${_verseText}"

${window.location.href}`;

window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
};

document.getElementById('btnCopy').onclick=function(){

const text=`"${_verseText}" — ${_verseRef}`;
navigator.clipboard.writeText(text);

this.textContent='Copied!';
setTimeout(()=>this.textContent='Copy Verse',2000);

};

}

loadVerse();

</script></body>
